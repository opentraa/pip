name: pip
description: >-
  A Flutter Picture in Picture plugin for Android and iOS with platform setup
  helpers, state callbacks, and native PiP view support.
version: 0.0.4
homepage: https://github.com/opentraa/pip
repository: https://github.com/opentraa/pip
issue_tracker: https://github.com/opentraa/pip/issues
documentation: https://github.com/opentraa/pip#readme
topics:
  - picture-in-picture
  - pip
  - android
  - ios
  - video
environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'
dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  plugin:
    platforms:
      android:
        package: org.opentraa.pip
        pluginClass: PipPlugin
      ios:
        pluginClass: PipPlugin
