name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.0.4
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  dry-run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest

    steps:
      - name: Validate tag format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: '${TAG}'. Tag must match pattern v0.0.0 (e.g., v0.0.4)" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/tags/{0}', inputs.tag) }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Dart for pub.dev publishing
        uses: dart-lang/setup-dart@v1

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check release metadata
        run: ./scripts/check_release_ready.sh

      - name: Dry run publish to pub.dev
        run: ./scripts/publish.sh dry-run

  prepublish:
    if: github.event_name == 'push'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Dart for pub.dev publishing
        uses: dart-lang/setup-dart@v1

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check release metadata
        run: ./scripts/check_release_ready.sh

  publish:
    if: github.event_name == 'push'
    needs: prepublish
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
