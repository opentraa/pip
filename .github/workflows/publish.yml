name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.0.4
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: macos-latest
    environment: pub.dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate publish ref
        env:
          GITHUB_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Publish workflow requires a tag ref like v0.0.4" >&2
            exit 1
          fi

      - name: Set up Dart for pub.dev publishing
        uses: dart-lang/setup-dart@v1

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check release metadata
        run: ./scripts/check_release_ready.sh

      - name: Publish to pub.dev
        run: ./scripts/publish.sh publish
