name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v0.0.4
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: macos-latest
    environment: pub.dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate tag format (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: '${TAG}'. Tag must match pattern v0.0.0 (e.g., v0.0.4)" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate publish ref
        env:
          GITHUB_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Publish workflow requires a tag ref like v0.0.4" >&2
            exit 1
          fi
          git rev-parse -q --verify "refs/tags/${GITHUB_REF_NAME}" >/dev/null

      - name: Set up Dart for pub.dev publishing
        uses: dart-lang/setup-dart@v1

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check release metadata
        run: ./scripts/check_release_ready.sh

      - name: Publish to pub.dev
        run: ./scripts/publish.sh publish
