name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.0.4
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./scripts/generate_release_notes.sh ${{ inputs.version }} ${{ github.repository }} ${{ github.ref_name }} .release-notes.md

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check Swift Package Manager support
        run: ./scripts/check_spm.sh

      - name: Check Android deprecated API usage
        run: ./scripts/check_android_deprecated_api.sh

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --ci --verbose ${{ inputs.version }}

      - name: Publish to pub.dev
        run: ./scripts/publish.sh publish
