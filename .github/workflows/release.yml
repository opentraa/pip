name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.0.4
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Run package checks
        run: ./scripts/check.sh

      - name: Check release metadata
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: ./scripts/check_release_ready.sh

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --ci ${{ inputs.version }}
